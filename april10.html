<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April 10th | The Yes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --my-msg: #ff4b72; 
            --her-msg: #ffe3e8; 
            --bg-color: #fff0f3;
            --text-dark: #333;
            --text-light: #fff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* --- Start Screen to Trigger Audio --- */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200;
        }

        #start-screen h2 {
            font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--my-msg); margin-bottom: 30px;
        }

        /* --- Phone Chat UI --- */
        #chat-ui { display: none; width: 100%; display: flex; justify-content: center; }

        .phone-container {
            width: 100%; max-width: 600px; background-color: #fff;
            min-height: 100vh; box-shadow: 0 0 20px rgba(255, 75, 114, 0.1);
            position: relative; padding-bottom: 80px;
        }

        .chat-header {
            background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 20px; text-align: center; border-bottom: 1px solid #ffe3e8;
            position: sticky; top: 0; z-index: 100;
        }

        .chat-header h2 { margin: 0; font-size: 1.3rem; color: var(--my-msg); }
        .chat-header p { margin: 2px 0 0; font-size: 0.85rem; color: #888; }

        .chat-window { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .timestamp { text-align: center; font-size: 0.75rem; color: #aaa; margin: 10px 0; }

        .msg-row { display: flex; width: 100%; opacity: 0; transform: translateY(20px); transition: all 0.6s ease; flex-direction: column;}
        .msg-row.visible { opacity: 1; transform: translateY(0); }
        .msg-row.me { align-items: flex-end; }
        .msg-row.her { align-items: flex-start; }

        .bubble { 
            max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 1rem; line-height: 1.5; 
            white-space: pre-wrap; font-family: 'Poppins', sans-serif; transition: all 0.3s ease;
        }
        .bubble.me { background-color: var(--my-msg); color: var(--text-light); border-bottom-right-radius: 4px; }
        .bubble.her { background-color: var(--her-msg); color: var(--text-dark); border-bottom-left-radius: 4px; }
        
        /* THE BIG PROPOSAL HIGHLIGHT */
        .highlight-proposal {
            font-size: 1.15rem;
            font-weight: 600;
            border: 2px solid var(--my-msg);
            box-shadow: 0 5px 15px rgba(255, 75, 114, 0.4);
            transform: scale(1.02);
        }

        .msg-time { font-size: 0.7rem; color: #bbb; margin-top: 4px; padding: 0 5px; }

        .typing-indicator {
            display: none; align-items: center; gap: 5px;
            padding: 12px 18px; background-color: var(--her-msg); border-radius: 20px;
            width: fit-content; margin-bottom: 15px; border-bottom-left-radius: 4px;
        }
        .dot { width: 6px; height: 6px; background: #ff4b72; border-radius: 50%; animation: bounce 1.4s infinite; opacity: 0.6; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        .redirect-container { text-align: center; margin-top: 50px; display: none; animation: fadeIn 1.5s; padding-bottom: 40px;}

        .next-btn {
            background-color: var(--my-msg); color: white; border: none;
            padding: 18px 40px; border-radius: 30px; font-weight: 600; font-family: 'Poppins', sans-serif;
            display: inline-block; transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(255, 75, 114, 0.4); font-size: 1.2rem; cursor: pointer; text-decoration: none;
        }
        .next-btn:hover { transform: scale(1.05); }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="Raabta.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <h2>Are you ready?</h2>
        <button class="next-btn" onclick="startExperience()">Open Our Story</button>
    </div>

    <div id="chat-ui" style="display: none;">
        <div class="phone-container">
            <div class="chat-header">
                <h2>Priyasha ❤️</h2>
                <p>April 10, 2025</p>
            </div>

            <div class="chat-window" id="chat">
                <div id="typing" class="typing-indicator">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>

                <div class="redirect-container" id="redirect-btn">
                    <a href="anniversary.html" class="next-btn">See Our Year ❤️ &rarr;</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatData = [
            { u: 'me', t: "We can get in a relationship fr\nBut one time we can meet\nWhat will ur parents say if u ask them ki I want to celebrate bday wuth my friends once outside\nBecause I didn't celebrate", time: "00:58" },
            { u: 'her', t: "vohh toh keh hi rahee hain\nnow ab meri classes lag gyi hain\nkoi bhi free nhi hai\nsabki classes hain\nkoii nhi arha\nso its cancelled", time: "01:00" },
            { u: 'me', t: "😭😭😭😭🥺🥺", time: "01:01" },
            { u: 'her', t: "😭😭😭ikkk acha khaasa plan", time: "01:01" },
            { u: 'me', t: "Koi nahi we'll have online dates", time: "01:02" },
            { u: 'her', t: "yuppp butt", time: "01:03" },
            { u: 'me', t: "Koi nahi we'll have fun online", time: "01:03" },
            { u: 'her', t: "kya karnaa hai\nlike milke hi karna hai start\nya abhi you wannaa", time: "01:03" },
            { u: 'me', t: "Im not sure as well😭😭\nI can start now and I can start after we meet", time: "01:05" },
            { u: 'her', t: "can we start now ??\nmilke firse kardena propose 🥺\nI dont wanna waste our days like that\nkab milengn sahi mein nhi pata 😭😭", time: "01:06" },
            { u: 'me', t: "Yes\nI already consider u my other half\nMy girlfriend\nMaybe more than a girlfriend", time: "01:07" },
            { u: 'her', t: "😭😭😭❤️\ni consider you tooo baby\njust that we needed that official procedure thing", time: "01:07" },
            { u: 'me', t: "Oh Iwill propose to you when we meet irl\nStraight uppp", time: "01:08" },
            { u: 'her', t: "i will dooo", time: "01:08" },
            { u: 'me', t: "So", time: "01:09" },
            { u: 'her', t: "sooo", time: "01:09" },
            // THE PROPOSAL - Highlights are marked true
            { u: 'me', t: "Miss Priyasha\nWill you be a part of my heart, a beauty I desire, the happiness I want, my legs that help me stand and my hands that can touch you, my everything to you...\nWill you be my girlfriend?", time: "01:11", highlight: true },
            { u: 'her', t: "Mr Deepanshu\nI am ready to be yourss !!\nI ammm\ntakee me withh youuu\nIts a YESSS OFCCC", time: "01:12", highlight: true },
            { u: 'me', t: "I love you", time: "01:12" },
            { u: 'her', t: "i lovee you tooo", time: "01:12" },
            { u: 'me', t: "I love you so much", time: "01:12" }
        ];

        const chatWindow = document.getElementById('chat');
        const typingIndicator = document.getElementById('typing');
        const redirectBtn = document.getElementById('redirect-btn');

        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            
            // Start the music
            const music = document.getElementById('bg-music');
            music.volume = 0.6; // Not too loud so she can read
            music.play().catch(e => console.log("Audio play issue"));

            setTimeout(() => playChat(0), 1500);
        }

        function playChat(index) {
            if (index >= chatData.length) {
                setTimeout(() => {
                    redirectBtn.style.display = 'block';
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 2000); // 2 second pause before final button
                return;
            }

            const msg = chatData[index];
            const isHer = msg.u === 'her';
            
            if (isHer) {
                typingIndicator.style.display = 'flex';
                chatWindow.insertBefore(typingIndicator, redirectBtn);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }

            // SLOWED DOWN SPEED CALCULATION
            // Base delay + extra delay per character. Much slower now.
            let delay = isHer ? 2000 + (msg.t.length * 50) : 1500 + (msg.t.length * 40);
            
            // Add a massive pause on the highlighted proposal messages to let them sink in
            if (msg.highlight) {
                delay += 3000; 
            }

            setTimeout(() => {
                typingIndicator.style.display = 'none';

                const row = document.createElement('div');
                row.className = `msg-row ${msg.u}`;
                
                // Add highlight class if needed
                let bubbleClass = `bubble ${msg.u}`;
                if (msg.highlight) {
                    bubbleClass += ` highlight-proposal`;
                }

                row.innerHTML = `
                    <div class="${bubbleClass}">${msg.t}</div>
                    <div class="msg-time">${msg.time}</div>
                `;

                chatWindow.insertBefore(row, typingIndicator);
                
                setTimeout(() => row.classList.add('visible'), 50);
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

                playChat(index + 1);

            }, delay);
        }
    </script>
</body>
</html>

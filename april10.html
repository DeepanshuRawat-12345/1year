<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April 10th: The Answer</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=gg+sans:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-primary: #1e1f22;
            --bg-secondary: #2b2d31;
            --text-normal: #dbdee1;
            --accent-green: #23a559;
            --rat-color: #ff73fa;
        }

        body { 
            background-color: var(--bg-primary); 
            color: var(--text-normal); 
            font-family: 'gg sans', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
        }

        /* Screens & Transitions */
        .screen { 
            position: fixed; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 1.5s ease-in-out; 
            z-index: 10;
        }
        .hidden { opacity: 0; pointer-events: none; }
        .active { opacity: 1; pointer-events: all; }

        /* Buttons */
        .btn { 
            background: var(--accent-green); color: white; 
            padding: 18px 45px; border: none; border-radius: 8px; 
            font-size: 1.3rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 8px 25px rgba(35, 165, 89, 0.4); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 30px rgba(35, 165, 89, 0.6); }

        /* Discord Chat Container */
        #chat-container { 
            width: 100%; max-width: 650px; height: 85vh; 
            overflow-y: auto; padding: 40px 20px; display: none; flex-direction: column; 
            scroll-behavior: smooth;
        }
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #111214; border-radius: 10px; }

        /* Messages */
        .msg { 
            margin-bottom: 20px; display: flex; flex-direction: column;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; 
            opacity: 0; transform: translateY(20px);
        }
        .header { display: flex; align-items: baseline; margin-bottom: 4px; }
        .user { font-weight: bold; font-size: 1.1rem; margin-right: 10px; }
        .time { font-size: 0.75rem; color: #80848e; }
        .text { font-size: 1.05rem; line-height: 1.5; white-space: pre-wrap; color: #e3e5e8; }

        /* THE BIG YES EFFECT */
        .yes-glow {
            color: #58f287 !important;
            font-size: 1.5rem !important;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(88, 242, 135, 0.6), 0 0 30px rgba(88, 242, 135, 0.4);
            animation: pulseGlow 2s infinite alternate;
        }

        /* Final Screen */
        .final-card {
            background: linear-gradient(145deg, #1e1f22, #111214);
            padding: 50px; border-radius: 20px;
            border: 1px solid rgba(88, 242, 135, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .final-img {
            width: 280px; height: 280px; object-fit: cover;
            border-radius: 50%; border: 6px solid #58f287;
            box-shadow: 0 0 40px rgba(88, 242, 135, 0.5);
            margin-top: 30px; animation: float 6s ease-in-out infinite;
        }

        /* Animations */
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { from { text-shadow: 0 0 10px rgba(88,242,135,0.4); } to { text-shadow: 0 0 25px rgba(88,242,135,0.8), 0 0 45px rgba(88,242,135,0.6); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

    </style>
</head>
<body>

    <audio id="successSong" src="success.mp3" preload="auto"></audio>

    <div id="intro" class="screen active" style="background: radial-gradient(circle, #2b2d31 0%, #111214 100%);">
        <h1 style="color:white; font-size: 3rem; margin-bottom:10px; letter-spacing: 2px;">39 Days Later...</h1>
        <p style="color:#80848e; font-size: 1.2rem; margin-bottom:50px;">April 10th, 2025 • 01:11 AM</p>
        <button class="btn" onclick="startApril()">Unlock The Memory</button>
    </div>

    <div id="chat-container"></div>

    <div id="finale" class="screen hidden"></div>

    <script>
        // EXACT TRANSCRIPT FROM YOUR SCREENSHOTS
        const SCRIPT = [
            { u: "rat", n: "THE UNDESERVED RAT 🐀 cute", c: "var(--rat-color)", t: "Miss Priyasha", time: "01:11 AM" },
            { u: "rat", n: "THE UNDESERVED RAT 🐀 cute", c: "var(--rat-color)", t: "Will you be a part of my heart, a beauty I desire, the happiness I want, my legs that help me stand and my hands that can touch you, my everything to you...", time: "01:11 AM" },
            { u: "rat", n: "THE UNDESERVED RAT 🐀 cute", c: "var(--rat-color)", t: "Will you be my girlfriend?", time: "01:11 AM", pause: 2500 }, // Suspense pause
            { u: "cat", n: "Katerina 🐈‍⬛ cute", c: "#ffffff", t: "Mr Deepanshu", time: "01:12 AM" },
            { u: "cat", n: "Katerina 🐈‍⬛ cute", c: "#ffffff", t: "I am ready to be yourss !!\nI ammm\ntakee me withh youuu", time: "01:12 AM" },
            // THE BIG MOMENT
            { u: "cat", n: "Katerina 🐈‍⬛ cute", c: "#ffffff", t: "Its a YESSS OFCCC", time: "01:12 AM", isYes: true, pause: 3500 },
            { u: "rat", n: "THE UNDESERVED RAT 🐀 cute", c: "var(--rat-color)", t: "I love you", time: "01:12 AM" },
            { u: "cat", n: "Katerina 🐈‍⬛ cute", c: "#ffffff", t: "i lovee you tooo", time: "01:12 AM" },
            { u: "rat", n: "THE UNDESERVED RAT 🐀 cute", c: "var(--rat-color)", t: "I love you so much", time: "01:12 AM" }
        ];

        function startApril() {
            document.getElementById('intro').classList.remove('active');
            document.getElementById('intro').classList.add('hidden');
            
            setTimeout(() => {
                const chat = document.getElementById('chat-container');
                chat.style.display = 'flex';
                playLines(0);
            }, 1000);
        }

        function playLines(index) {
            if (index >= SCRIPT.length) {
                setTimeout(showFinalCard, 3000);
                return;
            }
            
            const line = SCRIPT[index];
            const chat = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'msg';
            
            // Format the text with the glowing class if it's the big YES
            let textClass = line.isYes ? "text yes-glow" : "text";
            
            div.innerHTML = `
                <div class="header">
                    <span class="user" style="color:${line.c}">${line.n}</span>
                    <span class="time">${line.time}</span>
                </div>
                <div class="${textClass}">${line.t}</div>
            `;
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight; // Auto-scroll to bottom
            
            // If this is the YES message, trigger song and massive confetti
            if (line.isYes) {
                document.getElementById('successSong').volume = 0.6;
                document.getElementById('successSong').play().catch(e => console.log("Audio blocked"));
                
                // Double confetti blast!
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, zIndex: 100 });
                setTimeout(() => confetti({ particleCount: 150, spread: 120, origin: { y: 0.5 }, zIndex: 100 }), 500);
            }

            // Calculate delay: Standard 1.5s, plus any custom pause for suspense
            let delay = 1500 + (line.pause || 0);
            setTimeout(() => playLines(index + 1), delay);
        }

        function showFinalCard() {
            // Fade out chat
            document.getElementById('chat-container').style.opacity = '0';
            document.getElementById('chat-container').style.pointerEvents = 'none';
            
            // Setup and fade in final screen
            const finale = document.getElementById('finale');
            finale.innerHTML = `
                <div class="final-card">
                    <h1 style="font-size:3.5rem; color:white; margin:0; text-shadow: 0 0 20px rgba(255,255,255,0.5);">1 Year of Us ❤️</h1>
                    <p style="font-size:1.4rem; color:#80848e; margin-top:10px;">Happy Anniversary, Deepanshu & Priyasha.</p>
                    <img src="pic5.png" class="final-img" alt="Us">
                </div>
            `;
            
            setTimeout(() => {
                finale.classList.remove('hidden');
                finale.classList.add('active');
                
                // Continuous slow confetti rain
                var end = Date.now() + (15 * 1000);
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#58f287', '#ffffff'] });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#58f287', '#ffffff'] });
                    if (Date.now() < end) { requestAnimationFrame(frame); }
                }());
            }, 1000);
        }
    </script>
</body>
</html>
